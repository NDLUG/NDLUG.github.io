<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="wrap">
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
  {{ $js := resources.Get "js/anchors.js" | minify | fingerprint }}
  <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" defer></script>
</body>
</html>
